<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>HYDRA Limelight Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/limelight/limelight_box.css" />
  <link rel="stylesheet" href="./css/limelight/arrow+bbox.css" />
</head>

<body>
  <div id="dashboard-root">
    <div class="limelight-grid">

      <!-- ========================= -->
      <!-- LINHA 1 — LIME 4 (SÓ STREAM / SEM IA) -->
      <!-- ========================= -->
      <div class="limelight-row" id="lime4">

        <div class="camera-box arrow-parent">
          <img
            src="http://10.91.63.30:5800/stream.mjpg"
            alt="Lime 4 Stream"
            style="width:100%; height:100%; object-fit:cover;"
          >
        </div>

        <div class="info-box">
          <div class="info-title">Lime 4</div>

          <div class="offset-container" id="yaw-lime4">
            <div class="offset-line">
              <span class="offset-label">Trava de Mira:</span>
              <div class="offset-box"></div>
            </div>
            <div class="offset-modes">
              <span data-mode="0">OFF</span> |
              <span data-mode="1">TAG</span>
            </div>
          </div>

          <div class="info-footer">
            <span id="temp-lime4" class="ll-temp">Temp: --°C</span>
          </div>

        </div>
      </div>

      <!-- ========================= -->
      <!-- LINHA 2 — LIME 2+ (SÓ STREAM / SEM IA) -->
      <!-- ========================= -->
      <div class="limelight-row" id="lime2plus">

        <div class="camera-box arrow-parent">
          <img
            src="http://10.91.63.200:5800"
            alt="Lime 2+ Stream"
            style="width:100%; height:100%; object-fit:cover;"
          >
        </div>

        <div class="info-box">
          <div class="info-title">Lime 2+</div>

          <div class="offset-container" id="yaw-lime2plus">
            <div class="offset-line">
              <span class="offset-label">Trava de Mira:</span>
              <div class="offset-box"></div>
            </div>
            <div class="offset-modes">
              <span data-mode="0">OFF</span> |
              <span data-mode="1">TAG</span>
            </div>
          </div>

          <div class="offset-container" id="shooter-lime2plus">
            <div class="offset-line">
              <span class="offset-label">Shooter:</span>
              <div class="offset-box"></div>
            </div>
            <div class="offset-modes">
              <span data-mode="0">OFF</span> |
              <span data-mode="1">AUTO</span>
            </div>
          </div>

          <div class="info-footer">
            <span id="temp-lime2plus" class="ll-temp">Temp: --°C</span>
          </div>

        </div>
      </div>

      <!-- ========================= -->
      <!-- LINHA 3 — FISHEYE (COM IA: SETA + BBOX) -->
      <!-- ========================= -->
      <div class="limelight-row" id="lime2">

        <div class="camera-box arrow-parent">
          <img
            src="http://10.91.63.2:1181/?action=stream"
            alt="Fisheye Stream"
            style="width:100%; height:100%; object-fit:cover; transform: rotate(180deg);"
          >
          <div class="arrow hidden" id="arrow-lime2"></div>
        </div>

        <div class="info-box">
          <div class="info-title">Fisheye</div>

          <div class="offset-container" id="yaw-lime2">
            <div class="offset-line">
              <span class="offset-label">Trava de Mira:</span>
              <div class="offset-box"></div>
            </div>
            <div class="offset-modes">
              <span data-mode="0">OFF</span> |
              <span data-mode="1">BALL</span>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- JS -->
  <script type="module" src="./js/limelight/arrow_nt.js"></script>
  <script src="./js/limelight/modes.js"></script>

</body>
</html>
